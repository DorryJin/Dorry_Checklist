<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f0f12"/>
<title>이사 체크리스트</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f12;--bg2:#18181f;--bg3:#22222c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f5;--text2:#9090a8;--text3:#555568;
  --accent:#6C63FF;--accent2:#4ade80;--danger:#ff5e7a;
  --radius:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:15px;}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);padding:calc(var(--safe-top) + 8px) 16px 0;border-bottom:1px solid var(--border);}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.app-title{font-size:18px;font-weight:700;letter-spacing:-0.5px;}
.app-title span{color:var(--accent);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#555;display:inline-block;margin-left:6px;vertical-align:middle;transition:background .3s;}
.sync-dot.ok{background:var(--accent2);}
.sync-dot.err{background:var(--danger);}
.tab-row{display:flex;gap:4px;align-items:center;padding-bottom:5px;}
.tab{padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.tab-spacer{flex:1;}
.tab-icon-btn{flex-shrink:0;width:28px;height:28px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .2s;}
.tab-icon-btn:active,.tab-icon-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* TAG FILTER */
.tag-filter-wrap{padding:4px 0 6px;}
.tag-filter-bar{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;align-items:center;padding:0 16px;}
.tag-filter-bar::-webkit-scrollbar{display:none;}
.tag-filter-btn{flex-shrink:0;padding:4px 9px;border-radius:99px;border:1px solid var(--border2);background:var(--bg2);font-family:inherit;font-size:11px;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;line-height:1.4;}
.tag-filter-btn.active{border-color:var(--accent);background:rgba(108,99,255,.15);color:var(--accent);}
.tag-filter-all{position:sticky;left:16px;z-index:1;background:var(--bg)!important;}

/* LIST SELECTOR */
.list-selector-wrap{position:relative;margin-bottom:8px;}
.list-selector-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:inherit;cursor:pointer;padding:0;}
.list-selector-btn .ls-name{font-size:17px;font-weight:700;color:var(--text);}
.list-selector-btn .ls-arr{font-size:11px;color:var(--text3);transition:transform .2s;}
.list-selector-btn .ls-arr.open{transform:rotate(180deg);}
.list-dropdown{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;min-width:200px;z-index:200;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.list-dropdown.open{display:block;}
.list-item{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;transition:background .15s;font-size:14px;}
.list-item:active{background:var(--bg3);}
.list-item.active-list{color:var(--accent);}
.list-item-check{width:16px;height:16px;flex-shrink:0;}
.list-item-del{margin-left:auto;width:22px;height:22px;background:rgba(255,94,122,.1);border:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.list-add-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border);}
.list-add-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-family:inherit;font-size:13px;color:var(--text);outline:none;min-width:0;}
.list-add-input:focus{border-color:var(--accent);}
.list-add-btn{background:var(--accent);border:none;border-radius:7px;padding:7px 11px;color:#fff;font-family:inherit;font-size:13px;cursor:pointer;flex-shrink:0;}

/* SEARCH */
.search-wrap{padding:10px 16px 0;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;}
.search-box svg{flex-shrink:0;opacity:.4;}
.search-box input{background:none;border:none;outline:none;width:100%;font-family:inherit;font-size:14px;color:var(--text);}
.search-box input::placeholder{color:var(--text3);}

/* ADD SEC INLINE */
.add-sec-inline{display:none;align-items:center;gap:8px;margin:8px 16px 0;padding:9px 12px;background:var(--bg2);border:1px dashed var(--border2);border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--text2);width:calc(100% - 32px);transition:background .2s;}
.add-sec-inline.visible{display:flex;}

/* PROGRESS */
.progress-wrap{padding:6px 16px 0;}
.progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px;}
.progress-bar{height:3px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;padding:10px 16px calc(var(--safe-bot) + 280px);-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;}
.scroll-area.at-bottom{box-shadow:inset 0 -40px 40px -20px rgba(108,99,255,0.08);}

/* RUBBER BAND GLOW */
@keyframes rubberGlow {
  0%{box-shadow:inset 0 -40px 60px -10px rgba(255,255,255,0.06);}
  50%{box-shadow:inset 0 -60px 80px -10px rgba(255,255,255,0.12);}
  100%{box-shadow:inset 0 -40px 60px -10px rgba(255,255,255,0.06);}
}
.scroll-area.rubber{animation:rubberGlow 0.4s ease-out;}

/* SECTION */
.section{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:opacity .2s,transform .2s;}
.section.dragging{opacity:.5;transform:scale(.98);}
.section.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px rgba(108,99,255,.3);}
.sec-head{display:flex;align-items:center;gap:6px;padding:11px 12px;background:var(--bg2);cursor:pointer;user-select:none;min-height:44px;}
.sec-emoji{font-size:17px;line-height:1;flex-shrink:0;}
.sec-name{flex:1;font-size:14px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sec-count{font-size:11px;color:var(--text2);background:var(--bg3);padding:2px 7px;border-radius:99px;flex-shrink:0;white-space:nowrap;}
.sec-arr{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.sec-arr.open{transform:rotate(180deg);}
.sec-body{display:none;}
.sec-body.open{display:block;}

/* DRAG HANDLE */
.drag-handle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:grab;color:var(--text3);touch-action:none;}
.drag-handle:active{cursor:grabbing;}
.drag-handle svg{pointer-events:none;}
.sec-del{width:22px;height:22px;background:rgba(255,94,122,.1);border:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}

/* SUBSECTION */
.sub-head{display:flex;align-items:center;padding:7px 12px;background:var(--bg3);border-top:1px solid var(--border);}
.sub-name{font-size:11px;font-weight:500;color:var(--text2);flex:1;}
.sub-count{font-size:11px;color:var(--text3);}

/* ITEM */
.item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s;}
.item:active{background:var(--bg3);}
.check-ring{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.check-ring.done{background:var(--accent);border-color:var(--accent);}
.check-ring svg{opacity:0;transform:scale(.4);transition:all .2s;}
.check-ring.done svg{opacity:1;transform:scale(1);}
.item-text{flex:1;font-size:13px;line-height:1.4;min-width:0;word-break:keep-all;}
.item-text.done{text-decoration:line-through;color:var(--text3);}

/* TAG - 줄바꿈 없게 flex-shrink:0 + max-width 제한 */
.item-tag{flex-shrink:0;font-size:11px;font-weight:500;padding:2px 7px;border-radius:99px;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;max-width:72px;overflow:hidden;text-overflow:ellipsis;}
.item-tag.none{background:var(--bg3);color:var(--text3);border-color:var(--border);}
.item-tag.buy{background:rgba(74,222,128,.12);color:#4ade80;border-color:rgba(74,222,128,.25);}
.item-tag.home{background:rgba(96,165,250,.12);color:#60a5fa;border-color:rgba(96,165,250,.25);}
.item-tag.both{background:rgba(251,191,36,.12);color:#fbbf24;border-color:rgba(251,191,36,.25);}
/* 커스텀 태그 색상 팔레트 */
.item-tag.custom-0{background:rgba(167,139,250,.12);color:#a78bfa;border-color:rgba(167,139,250,.25);}
.item-tag.custom-1{background:rgba(251,113,133,.12);color:#fb7185;border-color:rgba(251,113,133,.25);}
.item-tag.custom-2{background:rgba(52,211,153,.12);color:#34d399;border-color:rgba(52,211,153,.25);}
.item-tag.custom-3{background:rgba(251,146,60,.12);color:#fb923c;border-color:rgba(251,146,60,.25);}
.item-tag.custom-4{background:rgba(34,211,238,.12);color:#22d3ee;border-color:rgba(34,211,238,.25);}

/* EDIT MODE */
.item-del{width:24px;height:24px;border-radius:50%;background:rgba(255,94,122,.12);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.add-row{display:flex;gap:7px;padding:9px 12px;border-top:1px solid var(--border);background:rgba(108,99,255,.04);}
.add-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-family:inherit;font-size:13px;color:var(--text);outline:none;min-width:0;}
.add-input:focus{border-color:var(--accent);}
.add-btn{background:var(--accent);border:none;border-radius:7px;padding:7px 12px;color:#fff;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;flex-shrink:0;}
.item-text[contenteditable]{outline:1px solid var(--accent);border-radius:4px;padding:1px 4px;background:rgba(108,99,255,.08);}

/* FAB */
.fab-row{position:fixed;bottom:calc(var(--safe-bot) + 14px);left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:150;}
.fab{padding:11px 18px;border:none;border-radius:99px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap;}
.fab-edit{background:var(--bg2);color:var(--text);border:1px solid var(--border2);}
.fab-reset{background:rgba(255,94,122,.15);color:var(--danger);border:1px solid rgba(255,94,122,.2);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:22px 18px calc(var(--safe-bot) + 22px);width:100%;border-top:1px solid var(--border2);}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;}
.modal input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px 13px;font-family:inherit;font-size:14px;color:var(--text);outline:none;margin-bottom:11px;}
.modal input:focus{border-color:var(--accent);}
.modal-emoji-row{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.emoji-btn{width:38px;height:38px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.emoji-btn.sel{border-color:var(--accent);background:rgba(108,99,255,.15);}
.modal-actions{display:flex;gap:7px;}
.modal-ok{flex:1;padding:12px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;}
.modal-cancel{padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-family:inherit;font-size:14px;cursor:pointer;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);font-size:14px;gap:8px;}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.hidden{display:none!important;}
.no-result{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div class="list-selector-wrap">
      <button class="list-selector-btn" onclick="toggleListDropdown()">
        <span class="ls-name" id="currentListName">📦 이사 체크리스트</span>
        <span class="ls-arr" id="lsArr">▾</span>
      </button>
      <div class="list-dropdown" id="listDropdown">
        <div id="listDropdownItems"></div>
        <div class="list-add-row">
          <input class="list-add-input" type="text" placeholder="새 목록 이름..." id="newListInput" onkeydown="if(event.key==='Enter')addList()"/>
          <button class="list-add-btn" onclick="addList()">추가</button>
        </div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="font-size:11px;color:var(--text3)" id="date-label"></span>
      <span class="sync-dot" id="syncDot"></span>
    </div>
  </div>
  <div class="tab-row">
    <button class="tab active" onclick="setTab('all')">전체</button>
    <button class="tab" onclick="setTab('todo')">미완료</button>
    <button class="tab" onclick="setTab('done')">완료</button>
    <div class="tab-spacer"></div>
    <button class="tab-icon-btn" onclick="toggleSearch()" id="searchToggleBtn" title="검색">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="tab-icon-btn" onclick="event.stopPropagation();openModalWithEdit()" title="카테고리 추가" style="width:auto;padding:0 10px;font-size:12px;font-weight:500;background:rgba(96,165,250,.15);color:#60a5fa;border-color:rgba(96,165,250,.3);">
      + 카테고리
    </button>
  </div>
</div>

<div class="search-wrap" id="searchWrap" style="display:none;">
  <div class="search-box">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" placeholder="검색..." id="searchInput" oninput="renderAll()"/>
    <button onclick="closeSearch()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 2px;">✕</button>
  </div>
</div>

<div class="tag-filter-wrap">
  <div class="tag-filter-bar" id="tagFilterBar"></div>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="prog-text">불러오는 중...</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="scroll-area" id="mainList">
  <div class="loading"><div class="spinner"></div> 데이터 불러오는 중...</div>
</div>

<div class="fab-row">
  <button class="fab fab-edit" id="editFab" onclick="toggleEdit()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    <span id="editFabLabel">편집</span>
  </button>
  <button class="fab fab-reset" id="resetFab" onclick="confirmReset()" style="display:none;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    초기화
  </button>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">새 카테고리 추가</div>
    <div class="modal-emoji-row" id="emojiPicker"></div>
    <input type="text" id="modalInput" placeholder="카테고리 이름" maxlength="20"/>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="document.getElementById('modal').classList.remove('open')">취소</button>
      <button class="modal-ok" onclick="addSection()">추가</button>
    </div>
  </div>
</div>

function buildDefaultTags(dataArr) {
  const t = {};
  dataArr.forEach(cat => {
    cat.subs.forEach((sub, si) => {
      sub.items.forEach((item, ii) => {
        const key = `${cat.id}-${si}-${ii}`;
        const s = item.toLowerCase();
        const hasBuy = s.includes('새로구매')||s.includes('새로 구매')||s.includes('구매중')||s.includes('구매완료')||s.includes('새로 삼');
        const hasHome = s.includes('집꺼')||s.includes('집에있');
        if (hasBuy && hasHome) t[key]='both';
        else if (hasBuy) t[key]='buy';
        else if (hasHome) t[key]='home';
      });
    });
  });
  return t;
}

function renderTagFilterBar() {
  const bar = document.getElementById('tagFilterBar');
  if (!bar) return;
  const truncate = label => {
    const chars = [...label];
    const emoji = /\p{Emoji}/u.test(chars[0]) ? chars[0] : '';
    if (emoji) {
      const rest = chars.slice(1).join('').replace(/^\s/,'');
      return rest.length > 2 ? emoji + rest.substring(0,2) + '…' : label;
    } else {
      return chars.length > 3 ? chars.slice(0,3).join('') + '…' : label;
    }
  };
  const canAdd = tagDefs.length < 5;
  bar.innerHTML =
    `<button class="tag-filter-btn" onclick="addTagDef()" style="color:var(--accent);border-color:var(--accent);opacity:.7;">🏷️+</button>` +
    `<button class="tag-filter-btn tag-filter-all${currentTagFilter==='all'?' active':''}" onclick="setTagFilter('all',this)">전체</button>` +
    tagDefs.map(t =>
      `<button class="tag-filter-btn${currentTagFilter===t.id?' active':''}"
        onclick="${editMode ? `deleteTagDef('${t.id}')` : `setTagFilter('${t.id}',this)`}"
        style="${editMode?'border-color:rgba(255,94,122,.3);':''}"
      >${editMode?'✕ ':''}${truncate(t.label)}</button>`
    ).join('') +
    `<button class="tag-filter-btn${currentTagFilter==='none'?' active':''}" onclick="setTagFilter('none',this)">미분류</button>`;
}

function addTagDef() {

  const label = name.trim().substring(0, 6);

  const id = 'tag_' + Date.now();

  saveTagDefs();

}

  if (isLoaded && timeSinceSave < 5000) return;
  const raw = snap.val();
  console.log('[onDataValue] applying data, raw type:', typeof raw, Array.isArray(raw) ? 'array' : 'object');
  if (raw) {
    data = parseData(raw);
  } else {
    data = currentListId === 'default'

    if (dataRef) dataRef.set(JSON.parse(JSON.stringify(data)));
    if (currentListId === 'default') {
      tags = buildDefaultTags(data);
      if (tagsRef) tagsRef.set(tags);
    }

  isLoaded = true;
  setSyncDot('ok');
  renderAll();
  applyEditModeUI();

function switchList(id) {

  if (tagsRef) { tagsRef.off(); tagsRef = null; }
  if (tagDefsRef) { tagDefsRef.off(); tagDefsRef = null; }
  currentRef = null;
  currentListId = id;
  isLoaded = false;
  listDropdownOpen = false;
  editMode = false;
  tagDefs = [];
  renderTagFilterBar();
  document.getElementById('listDropdown').classList.remove('open');
  document.getElementById('lsArr').classList.remove('open');
  document.getElementById('editFabLabel').textContent = '편집';
  document.getElementById('editFab').style.background = '';
  document.getElementById('editFab').style.color = '';
  document.getElementById('resetFab').style.display = 'none';
  renderListDropdown();
  document.getElementById('mainList').innerHTML = `<div class="loading"><div class="spinner"></div> 불러오는 중...</div>`;

  if (firebaseOk && db) {

    currentRef = db.ref(base);
    dataRef = db.ref(base + '/data');
    checksRef = db.ref(base + '/checks');
    tagsRef = db.ref(base + '/tags');
    tagDefsRef = db.ref(base + '/tagDefs');
    // tagDefs 실시간 리스너
    tagDefsRef.on('value', snap => {
      const val = snap.val();
      if (val) {
        const arr = Array.isArray(val) ? val : Object.values(val);
        tagDefs = arr.filter(t => t && t.id && t.label);
      }
      if (!tagDefs.length) {
        tagDefs = id === 'default' ? [...DEFAULT_TAG_DEFS] : [];

      renderTagFilterBar();

      setSyncDot('err');

      document.getElementById('mainList').innerHTML = `<div class="no-result">⚠️ 네트워크 연결을 확인해주세요</div>`;
    });
  } else {
    const saved = LS.getData(id);
    if (saved) {
      data = saved.data || (id === 'default' ? JSON.parse(JSON.stringify(DEFAULT_DATA)) : []);
      checks = saved.checks || {};
      tags = saved.tags || {};
    } else {
      data = id === 'default' ? JSON.parse(JSON.stringify(DEFAULT_DATA)) : [{id:'sample',emoji:'📝',title:'새 카테고리',subs:[{name:"항목",items:["샘플 항목 (편집 후 삭제)"]}]}];

// Firebase 객체→배열 변환 헬퍼
function toArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  return Object.keys(v).sort((a,b)=>+a-+b).map(k=>v[k]);
}

function parseData(raw) {
  return toArr(raw).map(cat => ({
    ...cat,
    subs: toArr(cat.subs).map(sub => ({
      ...sub,
      items: toArr(sub.items)
    }))
  }));
}

// ── RENDER ─────────────────────────────────────────
function tagClass(t) {
  if (['buy','home','both','none'].includes(t)) return t;
  const idx = tagDefs.findIndex(d => d.id === t);
  return idx >= 0 ? `custom-${idx % 5}` : 'none';
}

function tagLabel(t) {
  // tagDefs에서 먼저 찾기
  const def = tagDefs.find(d => d.id === t);
  // default 목록 기본 태그
  const defaultLabel =
    t==='buy' ? '🛒 새로구매' :
    t==='home' ? '🏠 집꺼' :
    t==='both' ? '🔄 둘다필요' : null;
  const label = def ? def.label : (currentListId === 'default' ? defaultLabel : null);
  if (!label) return null; // 태그 숨김
  // 이모지+2글자 or 3글자로 자르기
  const chars = [...label];
  const isEmoji = chars.length > 0 && /\p{Emoji}/u.test(chars[0]);
  if (isEmoji) {
    const rest = chars.slice(1).join('').replace(/^\s/, '');
    return chars[0] + rest.substring(0, 2);
  } else {
    return label.substring(0, 3);
  }
}

function updateProgress() {
  const keys = [];
  data.forEach(cat => cat.subs.forEach((sub,si) => sub.items.forEach((_,ii) => keys.push(`${cat.id}-${si}-${ii}`))));
  const total = keys.length;
  const done = keys.filter(k=>checks[k]).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-text').textContent = `${done} / ${total} 완료`;
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';
}

    document.getElementById('editFabLabel').textContent = '완료';
    document.getElementById('editFab').style.background = 'rgba(108,99,255,.2)';
    document.getElementById('editFab').style.color = 'var(--accent)';
    document.getElementById('resetFab').style.display = 'flex';
    renderAll();
  }
  openModal();
}

function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['all','todo','done'][i]===t));
  renderAll();
}

function setTagFilter(t, btn) {
  currentTagFilter = t;
  renderTagFilterBar();
  renderAll();
}

function renderAll() {
  if (!isLoaded) return;
  const q = document.getElementById('searchInput').value.trim();
  const list = document.getElementById('mainList');
  let html = '';
  let anyVisible = false;

  data.forEach((cat, ci) => {
    let catHtml = '';
    let catVisible = false;
    cat.subs.forEach((sub, si) => {
      let subHtml = '';
      let subVisible = editMode;
      sub.items.forEach((item, ii) => {
        const key = `${cat.id}-${si}-${ii}`;
        const done = !!checks[key];
        const tag = tags[key] || 'none';
        if (q && !item.toLowerCase().includes(q.toLowerCase())) return;
        if (currentTab==='todo' && done) return;
        if (currentTab==='done' && !done) return;
        if (currentTagFilter!=='all' && tag!==currentTagFilter) return;
        subVisible = true; catVisible = true; anyVisible = true;
        if (editMode) {
          subHtml += `<div class="item" data-key="${key}">
            <div class="check-ring${done?' done':''}" onclick="toggleCheck(event,'${key}')">
              <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg>
            </div>
            <span class="item-text${done?' done':''}" contenteditable="true" onblur="renameItem(${ci},${si},${ii},this)" onclick="event.stopPropagation()">${item}</span>
            ${(()=>{const l=tagLabel(tag);return (l||editMode)?`<span class="item-tag ${tagClass(tag)}" onclick="cycleTag(event,'${key}')">${l||'태그'}</span>`:''})()}
            <button class="item-del" onclick="deleteItem(${ci},${si},${ii})">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#ff5e7a" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>`;
        } else {
          subHtml += `<div class="item" onclick="toggleCheck(event,'${key}')">
            <div class="check-ring${done?' done':''}">
              <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg>
            </div>
            <span class="item-text${done?' done':''}">${item}</span>
            ${(()=>{const l=tagLabel(tag);return (tag!=='none'&&l)?`<span class="item-tag ${tagClass(tag)}" onclick="cycleTag(event,'${key}')">${l}</span>`:''})()}
          </div>`;
        }
      });
      if (subVisible || editMode) {
        if (editMode) catVisible = true;
        const doneSub = sub.items.filter((_,i2)=>checks[`${cat.id}-${si}-${i2}`]).length;
        catHtml += `<div class="sub-head"><span class="sub-name">${sub.name}</span><span class="sub-count">${doneSub}/${sub.items.length}</span></div>${subHtml}`;
        if (editMode) catHtml += `<div class="add-row">
          <input class="add-input" type="text" placeholder="항목 추가..." id="add-${ci}-${si}" onkeydown="if(event.key==='Enter')addItem(${ci},${si})"/>
          <button class="add-btn" onclick="addItem(${ci},${si})">추가</button>
        </div>`;
      }
    });
    // 항목이 없는 카테고리도 필터/검색 없을 때는 항상 표시
    const hasFilter = q || currentTab !== 'all' || currentTagFilter !== 'all';
    if (catVisible || (!hasFilter && cat.subs.reduce((a,s)=>a+s.items.length,0) === 0) || editMode) {
      if (!hasFilter || editMode) { catVisible = true; anyVisible = true; }
      const doneCount = cat.subs.reduce((a,s,si2)=>a+s.items.filter((_,i2)=>checks[`${cat.id}-${si2}-${i2}`]).length,0);
      const totalCount = cat.subs.reduce((a,s)=>a+s.items.length,0);
      const isOpen = q ? true : (localStorage.getItem('open-'+cat.id)==='1');
      html += `<div class="section${isOpen?' ':'  '}" id="sec-${cat.id}" draggable="${editMode}" 
        ondragstart="onDragStart(event,'${cat.id}')" ondragover="onDragOver(event,'${cat.id}')" 
        ondrop="onDrop(event,'${cat.id}')" ondragend="onDragEnd(event)">
        <div class="sec-head" onclick="toggleSec('${cat.id}')">
          ${editMode?`<div class="drag-handle" ontouchstart="onTouchStart(event,'${cat.id}')" ontouchmove="onTouchMove(event)" ontouchend="onTouchEnd(event,'${cat.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
          </div>`:''}
          <span class="sec-emoji">${cat.emoji}</span>
          ${editMode
            ? `<span class="sec-name" contenteditable="true" onblur="renameSection(${ci},this)" onclick="event.stopPropagation()">${cat.title}</span>`
            : `<span class="sec-name">${cat.title}</span>`
          }
          <span class="sec-count">${doneCount}/${totalCount}</span>
          <span class="sec-arr${isOpen?' open':''}" id="arr-${cat.id}">▾</span>
          ${editMode?`<div style="width:1px;height:18px;background:var(--border2);margin:0 4px;flex-shrink:0;"></div>
          <button class="sec-del" onclick="deleteSection(event,${ci})">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ff5e7a" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>`:''}
        </div>
        <div class="sec-body${isOpen?' open':''}" id="body-${cat.id}">${catHtml}</div>
      </div>`;
    }
  });

  list.innerHTML = anyVisible ? html : (editMode
    ? `<div class="no-result" style="padding-top:24px">카테고리를 추가해보세요 👆</div>`
    : `<div class="no-result">항목이 없습니다</div>`);
  updateProgress();
  renderTagFilterBar();
}

// ── SECTION TOGGLE ─────────────────────────────────
function toggleSec(id) {
  const body = document.getElementById('body-'+id);
  const arr = document.getElementById('arr-'+id);
  if (!body) return;
  const isOpen = body.classList.toggle('open');
  arr && arr.classList.toggle('open', isOpen);
  localStorage.setItem('open-'+id, isOpen?'1':'0');
}

// ── CHECK / TAG ────────────────────────────────────
function toggleCheck(e, key) {
  e.stopPropagation();
  checks[key] = !checks[key];
  saveChecks(); renderAll();
}

function cycleTag(e, key) {
  e.stopPropagation();
  if (!editMode) return;
  const order = ['none', ...tagDefs.map(t => t.id)];
  const cur = tags[key] || 'none';
  const idx = order.indexOf(cur);
  tags[key] = order[(idx === -1 ? 0 : idx + 1) % order.length];
  saveTags(); renderAll();
}

// ── EDIT MODE ──────────────────────────────────────
function applyEditModeUI() {
  document.getElementById('editFabLabel').textContent = editMode?'완료':'편집';
  document.getElementById('editFab').style.background = editMode?'rgba(108,99,255,.2)':'';
  document.getElementById('editFab').style.color = editMode?'var(--accent)':'';
  document.getElementById('resetFab').style.display = editMode ? 'flex' : 'none';
  renderTagFilterBar();
}

function toggleEdit() {
  const scrollArea = document.getElementById('mainList');
  const scrollTop = scrollArea.scrollTop;
  editMode = !editMode;
  applyEditModeUI();
  renderAll();
  // 렌더링 + 레이아웃 완전히 끝난 후 복원
  setTimeout(()=>{ scrollArea.scrollTop = scrollTop; }, 50);
}

function renameSection(ci, el) {
  const val = el.textContent.trim();
  if (val) {  data[ci].title=val; save();  }
  else { el.textContent=data[ci].title; }
}

function renameItem(ci, si, ii, el) {
  const val = el.textContent.trim();
  if (val) {  data[ci].subs[si].items[ii]=val; save();  }
  else { el.textContent=data[ci].subs[si].items[ii]; }
}

function deleteItem(ci, si, ii) {
  
  data[ci].subs[si].items.splice(ii,1);
  const catId = data[ci].id;
  const remap = (obj) => {
    const n={};
    Object.keys(obj).forEach(k=>{
      const d2=k.lastIndexOf('-'), d1=k.lastIndexOf('-',d2-1);
      const id=k.substring(0,d1), s=parseInt(k.substring(d1+1,d2)), i2=parseInt(k.substring(d2+1));
      if(id===catId&&s===si){ if(i2<ii)n[k]=obj[k]; else if(i2>ii)n[`${id}-${s}-${i2-1}`]=obj[k]; }
      else n[k]=obj[k];
    });
    return n;
  };
  checks=remap(checks); tags=remap(tags);
  save(); renderAll();
  
}

function addItem(ci, si) {
  const el = document.getElementById(`add-${ci}-${si}`);
  if (!el) return;
  const val = el.value.trim();
  if (!val) return;
  el.value='';
  
  data[ci].subs[si].items.push(val);
  save(); renderAll();
  
}

function deleteSection(e, ci) {
  e.stopPropagation();
  if (data.length <= 1) {
    alert('카테고리가 1개일 때는 삭제할 수 없어요.\n새 카테고리를 먼저 추가해주세요!');
    return;
  }
  if (!confirm(`"${data[ci].title}" 카테고리를 삭제할까요?`)) return;
  data.splice(ci,1);
  save(); renderAll();
}

// ── DRAG & DROP (데스크탑) ─────────────────────────
let dragId = null;

function onDragStart(e, id) {
  if (!editMode) { e.preventDefault(); return; }
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>{ const el=document.getElementById('sec-'+id); if(el)el.classList.add('dragging'); },0);
}

function onDragOver(e, id) {
  if (!editMode || !dragId || dragId===id) return;
  e.preventDefault();
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('drag-over'));
  const el=document.getElementById('sec-'+id);
  if(el) el.classList.add('drag-over');
}

function onDrop(e, targetId) {
  if (!editMode || !dragId || dragId===targetId) return;
  e.preventDefault();
  const fromIdx = data.findIndex(c=>c.id===dragId);
  const toIdx = data.findIndex(c=>c.id===targetId);
  if (fromIdx<0||toIdx<0) return;
  const [moved] = data.splice(fromIdx,1);
  data.splice(toIdx,0,moved);
  save(); renderAll();
}

function onDragEnd(e) {
  document.querySelectorAll('.section').forEach(s=>{ s.classList.remove('dragging'); s.classList.remove('drag-over'); });
  dragId = null;
}

// ── TOUCH DRAG (모바일) ────────────────────────────
let touchDragId = null;
let touchClone = null;
let touchOffsetY = 0;
let touchStartY = 0;

function onTouchStart(e, id) {
  if (!editMode) return;
  e.stopPropagation();
  touchDragId = id;
  touchStartY = e.touches[0].clientY;
  const el = document.getElementById('sec-'+id);
  const rect = el.getBoundingClientRect();
  touchOffsetY = e.touches[0].clientY - rect.top;
  touchClone = el.cloneNode(true);
  touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.8;z-index:999;pointer-events:none;border-radius:14px;`;
  document.body.appendChild(touchClone);
  el.style.opacity = '0.3';
}

function onTouchMove(e) {
  if (!touchDragId || !touchClone) return;
  e.preventDefault();
  const y = e.touches[0].clientY;
  touchClone.style.top = (y - touchOffsetY) + 'px';
  // highlight target
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('drag-over'));
  const els = document.elementsFromPoint(e.touches[0].clientX, y);
  const target = els.find(el=>el.classList&&el.classList.contains('section')&&el.id!=='sec-'+touchDragId);
  if (target) target.classList.add('drag-over');
}

function onTouchEnd(e, id) {
  if (!touchDragId) return;
  const lastTouch = e.changedTouches[0];
  const els = document.elementsFromPoint(lastTouch.clientX, lastTouch.clientY);
  const target = els.find(el=>el.classList&&el.classList.contains('section')&&el.id!=='sec-'+touchDragId);
  if (target) {
    const targetId = target.id.replace('sec-','');
    const fromIdx = data.findIndex(c=>c.id===touchDragId);
    const toIdx = data.findIndex(c=>c.id===targetId);
    if (fromIdx>=0&&toIdx>=0) { const [m]=data.splice(fromIdx,1); data.splice(toIdx,0,m); save(); }
  }
  if (touchClone) { touchClone.remove(); touchClone=null; }
  document.querySelectorAll('.section').forEach(s=>{ s.style.opacity=''; s.classList.remove('drag-over'); });
  touchDragId = null;
  renderAll();
}

// ── MODAL ──────────────────────────────────────────
function openModal() {
  selectedEmoji='🏠';
  document.getElementById('modalInput').value='';
  document.getElementById('emojiPicker').innerHTML=EMOJIS.map(em=>`<button class="emoji-btn${em===selectedEmoji?' sel':''}" onclick="selectEmoji('${em}')">${em}</button>`).join('');
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modalInput').focus(),100);
}
function selectEmoji(em) {
  selectedEmoji=em;
  document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.toggle('sel',b.textContent===em));
}
function closeModal(e) {
  if(e.target===document.getElementById('modal')) document.getElementById('modal').classList.remove('open');
}
function addSection() {
  const name=document.getElementById('modalInput').value.trim();
  if(!name) return;
  const newId = 'sec_'+Date.now();
  data.push({id:newId, emoji:selectedEmoji, title:name, subs:[{name:"항목",items:[]}]});
  document.getElementById('modal').classList.remove('open');
  save(); renderAll();
  // 새 카테고리로 스크롤
  setTimeout(()=>{
    const el = document.getElementById('sec-'+newId);
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 100);
}

// ── RESET ──────────────────────────────────────────
function confirmReset() {
  if(confirm('체크 기록을 모두 초기화할까요?\n(항목 내용과 태그는 유지됩니다)')) {
    checks={};
    save(); renderAll();
  }
}

// ── INIT ───────────────────────────────────────────
const d = new Date();
document.getElementById('date-label').textContent = `${d.getMonth()+1}월 ${d.getDate()}일`;

// 리바운드 효과 - 스크롤 가능할 때만
const scrollArea = document.getElementById('mainList');
let rubberTimer = null;
scrollArea.addEventListener('scroll', () => {
  const el = scrollArea;
  const isScrollable = el.scrollHeight > el.clientHeight;
  if (!isScrollable) return;
  const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 10;
  if (atBottom) {
    el.classList.remove('rubber');
    void el.offsetWidth; // reflow
    el.classList.add('rubber');
    clearTimeout(rubberTimer);
    rubberTimer = setTimeout(()=>el.classList.remove('rubber'), 400);
  }
}, {passive: true});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
}

renderTagFilterBar();
initLists();
</script>
